name: Desplegar migraciones de base de datos

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/deploy-database.yml"
  workflow_dispatch:
    inputs:
      registrar_migraciones_existentes:
        description: "Marcar como aplicadas las migraciones ejecutadas antes de activar CI"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: supabase-production-migrations
  cancel-in-progress: false

jobs:
  migrate:
    name: Aplicar migraciones en producción
    runs-on: ubuntu-latest
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v6

      - name: Instalar Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.0

      - name: Comprobar secretos requeridos
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || { echo "Falta SUPABASE_ACCESS_TOKEN"; exit 1; }
          test -n "$SUPABASE_DB_PASSWORD" || { echo "Falta SUPABASE_DB_PASSWORD"; exit 1; }

      - name: Enlazar el proyecto de producción
        run: supabase link --project-ref gietljsxadqwxoetobnb

      - name: Registrar el historial previo
        if: ${{ inputs.registrar_migraciones_existentes == true }}
        run: |
          supabase migration repair --status applied 20260101000000
          supabase migration repair --status applied 20260704000000
          supabase migration repair --status applied 20260704010000

      - name: Aplicar migraciones pendientes
        run: supabase db push --linked
